# ============================================
#  XINDICATE'S HYPRLAND (Modified by Normo!)
#  Clean + stable Hyprland setup
# ============================================

monitor=,preferred,auto,1

# --- Autostart ---
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = waybar
exec-once = swaybg -i /path/to/your/wallpaper.png
exec-once = mako
exec-once = wl-paste --watch cliphist store
exec-once = paplay /path/to/your/startup/sound.oga

# --- Environment ---
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1

# --- Input ---
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    touchpad {
        natural_scroll = yes
    }
}

# --- General look ---
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 3
    col.inactive_border = rgba(e6e6fa1a)
    col.active_border = rgba(bdcdf466)
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 13

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
    }

}

animations {
    enabled = yes
    animation = windows, 1, 6, default
    animation = border, 1, 6, default
    animation = fade, 1, 6, default
    animation = workspaces, 1, 6, default
}

# --- Dwindle ---
dwindle {
    pseudotile = yes
    preserve_split = yes
}

# --- Master ---
master {
    new_status = master
}

# --- Gestures ---
gestures {
    gesture = 4, horizontal, workspace
    workspace_swipe_distance = 700
    workspace_swipe_cancel_ratio = 0
    workspace_swipe_min_speed_to_force = 100
    workspace_swipe_invert = true
    workspace_swipe_create_new = true
    workspace_swipe_forever = true
}

# --- Keybinds ---
$mainMod = SUPER

bind = $mainMod, SPACE, exec, kitty
bind = $mainMod, Z, exec, zen
bind = $mainMod, Q, killactive
bind = $mainMod, F11, fullscreen
bind = $mainMod, F, exec, nautilus
bind = $mainMod, W, togglefloating
bind = $mainMod, R, exec, wofi --show drun
bind = $mainMod, P, pseudo
bind = $mainMod, S, togglesplit
bind = $mainMod, X, exec, /.local/bin/pwropts
bind = $mainMod, A, exec, control
bind = $mainMod, V, exec, cliphist list | wofi -S dmenu | cliphist decode | wl-copy

# Move/resize windows with mouse (SUPER + mouse)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Move focus (arrow keys) ---
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# --- Move windows (SUPER + SHIFT + arrows) ---
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# --- Workspaces ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod CTRL, right, movetoworkspace, +1
bind = $mainMod CTRL, left, movetoworkspace, -1

# --- Screenshots (grim + slurp) ---
# Full screen -> save + clipboard
bind = , Print, exec, grim - | tee ~/Pictures/Screenshots/Screenshot-$(date +'%Y-%m-%d_%H-%M-%S').png | wl-copy

# Area select -> save + clipboard
bind = SHIFT, Print, exec, slurp | grim -g - - | tee ~/Pictures/Screenshots/Screenshot-$(date +'%Y-%m-%d_%H-%M-%S').png | wl-copy


# --- Volume ---
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# --- Brightness ---
bind = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# --- Reload Hyprland ---
bind = $mainMod SHIFT, R, exec, hyprctl reload
